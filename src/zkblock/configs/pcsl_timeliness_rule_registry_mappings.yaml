version: 1.0
description: "PCSL timeliness custom rule mappings"

row_rules:
  - id: row.sql_expression
    callable_ref: zkblock.dqx.builtin_row_rules.sql_expression
    description: "Checks whether a Spark SQL boolean expression is true"
    since_version: "1.0"
    deprecated: false

  - id: row.elapsed_days_sql
    callable_ref: zkblock.dqx.builtin_row_rules.elapsed_days_sql
    description: "Checks an elapsed-calendar-days Spark SQL expression between two date points"
    since_version: "1.0"
    deprecated: false

  - id: row.date_format_invalid
    callable_ref: zkblock.dqx.builtin_row_rules.is_date_format_invalid
    description: "Checks whether a populated value cannot be parsed using accepted date formats"
    since_version: "1.0"
    deprecated: false

  - id: row.timeliness_matrix
    callable_ref: zkblock.dqx.custom_rules.timeliness.timeliness_matrix
    description: "Reusable PCSL timeliness matrix that emits matching T test_code"
    since_version: "1.0"
    deprecated: false

dataset_rules: []
