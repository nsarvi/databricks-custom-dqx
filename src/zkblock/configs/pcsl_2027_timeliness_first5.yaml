version: 1
description: "PCSL 2027 timeliness rules - first five rules from PDF"

rule_packs:
  - id: pcsl_2027_timeliness_first5
    rule_version: "1.0"
    category: PCSL
    subcategory: Timeliness
    rule_type: row
    fast_fail: false

    # Optional. If omitted, the compiler uses the first incoming DataFrame column
    # as the DQX row-rule anchor for pack-level composite rules.
    row_anchor_column: ORG_DETRMN_NUM

    columns:
      Date Request Received:
        rules:
          - id: row.date_format_invalid
            criticality: error
            message: "Date Request Received must be a valid date."
            arguments:
              accepted_formats: ["yyyy-MM-dd", "MM/dd/yyyy", "M/d/yyyy"]
              allow_null_or_blank: true
            metadata:
              validation_family: date_format

      AOR/Equivalent Notice Receipt Date:
        rules:
          - id: row.date_format_invalid
            criticality: error
            message: "AOR/Equivalent Notice Receipt Date must be a valid date or NA."
            arguments:
              accepted_formats: ["yyyy-MM-dd", "MM/dd/yyyy", "M/d/yyyy"]
              allowed_values: ["NA", "N/A"]
              allow_null_or_blank: true
            metadata:
              validation_family: date_format

      Date verbal notification provided:
        rules:
          - id: row.date_format_invalid
            criticality: error
            message: "Date verbal notification provided must be a valid date."
            arguments:
              accepted_formats: ["yyyy-MM-dd", "MM/dd/yyyy", "M/d/yyyy"]
              allow_null_or_blank: true
            metadata:
              validation_family: date_format

      Date written notification provided:
        rules:
          - id: row.date_format_invalid
            criticality: error
            message: "Date written notification provided must be a valid date or NA."
            arguments:
              accepted_formats: ["yyyy-MM-dd", "MM/dd/yyyy", "M/d/yyyy"]
              allowed_values: ["NA", "N/A"]
              allow_null_or_blank: true
            metadata:
              validation_family: date_format

    emit:
      match_policy: first
      code_separator: "|"

    precompute_rules:
      rules:
        - id: row.sql_expression
          name: standard_non_part_b_approval_denial
          criticality: error
          message: "Standard non-Part-B approval/denial population"
          arguments:
            sql_expression: >
              `Is this a Primary Part B Drug Request?` = 'N'
              AND `Processing Priority` = 'S'
              AND `Disposition` IN ('F', 'P', 'A')

        - id: row.sql_expression
          name: no_extension
          criticality: error
          message: "No extension taken"
          arguments:
            sql_expression: "`Was an extension taken?` = 'N'"

        - id: row.sql_expression
          name: with_extension
          criticality: error
          message: "Extension taken"
          arguments:
            sql_expression: "`Was an extension taken?` = 'Y'"

        - id: row.sql_expression
          name: request_and_verbal_valid
          criticality: error
          message: "Request received date and verbal notification date are valid"
          arguments:
            sql_expression: >
              `Date Request Received` IS NOT NULL
              AND trim(cast(`Date Request Received` as string)) <> ''
              AND to_date(`Date Request Received`) IS NOT NULL
              AND `Date verbal notification provided` IS NOT NULL
              AND trim(cast(`Date verbal notification provided` as string)) <> ''
              AND to_date(`Date verbal notification provided`) IS NOT NULL

        - id: row.sql_expression
          name: aor_valid
          criticality: error
          message: "AOR receipt date is valid"
          arguments:
            sql_expression: >
              `AOR/Equivalent Notice Receipt Date` IS NOT NULL
              AND trim(cast(`AOR/Equivalent Notice Receipt Date` as string)) <> ''
              AND to_date(`AOR/Equivalent Notice Receipt Date`) IS NOT NULL

        - id: row.sql_expression
          name: aor_na
          criticality: error
          message: "AOR receipt date is NA"
          arguments:
            sql_expression: "upper(trim(cast(`AOR/Equivalent Notice Receipt Date` as string))) = 'NA'"

        - id: row.sql_expression
          name: written_valid
          criticality: error
          message: "Written notification date is valid"
          arguments:
            sql_expression: >
              `Date written notification provided` IS NOT NULL
              AND trim(cast(`Date written notification provided` as string)) <> ''
              AND to_date(`Date written notification provided`) IS NOT NULL

        - id: row.sql_expression
          name: written_na
          criticality: error
          message: "Written notification date is NA"
          arguments:
            sql_expression: "upper(trim(cast(`Date written notification provided` as string))) = 'NA'"

        - id: row.sql_expression
          name: verbal_before_written
          criticality: error
          message: "Verbal notification occurs before written notification"
          arguments:
            sql_expression: >
              to_date(`Date verbal notification provided`)
              < to_date(`Date written notification provided`)

    business_rules:
      - id: T100.1
        description: "Untimely verbal notification - standard approval/denial with verbal and written notice, AOR date present, no extension"
        use_precompute_rules:
          - standard_non_part_b_approval_denial
          - no_extension
          - request_and_verbal_valid
          - aor_valid
          - written_valid
          - verbal_before_written
        rules:
          - id: row.elapsed_days_sql
            name: gt_7_calendar_days
            criticality: error
            message: "Elapsed calendar days from later request/AOR to verbal notification is greater than 7"
            arguments:
              start:
                sql_expression: >
                  greatest(
                    to_date(`Date Request Received`),
                    to_date(`AOR/Equivalent Notice Receipt Date`)
                  )
              end:
                sql_expression: "to_date(`Date verbal notification provided`)"
              sql_expression: "{elapsed_days} > 7"
            metadata:
              error_dictionary_test_cd: "T100.1"

      - id: T100.2
        description: "Untimely verbal notification - standard approval/denial with verbal and written notice, no AOR date, no extension"
        use_precompute_rules:
          - standard_non_part_b_approval_denial
          - no_extension
          - request_and_verbal_valid
          - aor_na
          - written_valid
          - verbal_before_written
        rules:
          - id: row.elapsed_days_sql
            name: gt_7_calendar_days
            criticality: error
            message: "Elapsed calendar days from request received to verbal notification is greater than 7"
            arguments:
              start:
                sql_expression: "to_date(`Date Request Received`)"
              end:
                sql_expression: "to_date(`Date verbal notification provided`)"
              sql_expression: "{elapsed_days} > 7"
            metadata:
              error_dictionary_test_cd: "T100.2"

      - id: T100.3
        description: "Untimely verbal notification - standard approval/denial with verbal and written notice, AOR date present, with extension"
        use_precompute_rules:
          - standard_non_part_b_approval_denial
          - with_extension
          - request_and_verbal_valid
          - aor_valid
          - written_valid
          - verbal_before_written
        rules:
          - id: row.elapsed_days_sql
            name: gt_21_calendar_days
            criticality: error
            message: "Elapsed calendar days from later request/AOR to verbal notification is greater than 21"
            arguments:
              start:
                sql_expression: >
                  greatest(
                    to_date(`Date Request Received`),
                    to_date(`AOR/Equivalent Notice Receipt Date`)
                  )
              end:
                sql_expression: "to_date(`Date verbal notification provided`)"
              sql_expression: "{elapsed_days} > 21"
            metadata:
              error_dictionary_test_cd: "T100.3"

      - id: T100.4
        description: "Untimely verbal notification - standard approval/denial with verbal and written notice, no AOR date, with extension"
        use_precompute_rules:
          - standard_non_part_b_approval_denial
          - with_extension
          - request_and_verbal_valid
          - aor_na
          - written_valid
          - verbal_before_written
        rules:
          - id: row.elapsed_days_sql
            name: gt_21_calendar_days
            criticality: error
            message: "Elapsed calendar days from request received to verbal notification is greater than 21"
            arguments:
              start:
                sql_expression: "to_date(`Date Request Received`)"
              end:
                sql_expression: "to_date(`Date verbal notification provided`)"
              sql_expression: "{elapsed_days} > 21"
            metadata:
              error_dictionary_test_cd: "T100.4"

      - id: T101.1
        description: "Untimely verbal notification - standard approval/denial with verbal notice only, AOR date present, no extension"
        use_precompute_rules:
          - standard_non_part_b_approval_denial
          - no_extension
          - request_and_verbal_valid
          - aor_valid
          - written_na
        rules:
          - id: row.elapsed_days_sql
            name: gt_7_calendar_days
            criticality: error
            message: "Elapsed calendar days from later request/AOR to verbal notification is greater than 7"
            arguments:
              start:
                sql_expression: >
                  greatest(
                    to_date(`Date Request Received`),
                    to_date(`AOR/Equivalent Notice Receipt Date`)
                  )
              end:
                sql_expression: "to_date(`Date verbal notification provided`)"
              sql_expression: "{elapsed_days} > 7"
            metadata:
              error_dictionary_test_cd: "T101.1"
